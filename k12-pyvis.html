<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; overflow: hidden; }

.topbar h1 { font-family: 'Instrument Serif', serif; font-size: 24px; font-weight: 400; color: var(--gold); }

.nav-links { display: flex; gap: 4px; }

.sidebar { position: fixed; top: var(--topbar); left: 0; bottom: 0; width: var(--sidebar); background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; z-index: 50; padding: 14px; }

.sec-title { font-family: 'Instrument Serif', serif; font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 7px; }
.sec-title::before { content: ''; width: 3px; height: 12px; background: var(--gold); border-radius: 2px; }

.book-item { display: flex; align-items: center; gap: 7px; padding: 5px 6px; border-radius: 5px; cursor: pointer; transition: all 0.15s; user-select: none; }
.book-item:hover { background: rgba(255,255,255,0.03); }
.book-item.active { background: rgba(255,255,255,0.05); }
.book-item.off { opacity: 0.25; }
.book-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.book-label { font-size: 11px; color: var(--text2); }
.book-item.active .book-label { color: var(--text); font-weight: 500; }
.book-count { font-size: 9px; color: var(--text3); margin-left: auto; }

.book-btns { display: flex; gap: 4px; margin: 8px 0; }
.book-btn { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text3); padding: 4px; border-radius: 4px; font-size: 9px; font-family: 'DM Sans', sans-serif; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
.book-btn:hover { color: var(--text); }

.physics-toggle { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
.toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.toggle-label { font-size: 11px; color: var(--text2); }
.toggle-switch { width: 36px; height: 20px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; position: relative; transition: background 0.2s; }
.toggle-switch.on { background: rgba(255,200,87,0.3); }
.toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: var(--text3); border-radius: 50%; transition: all 0.2s; }
.toggle-switch.on::after { left: 18px; background: var(--gold); }

.hint { font-size: 10px; color: var(--text3); margin-top: 14px; padding-top: 10px; border-top: 1px solid var(--border); line-height: 1.5; }
.hint b { color: var(--text2); }

#graph { position: fixed; top: var(--topbar); left: var(--sidebar); right: 0; bottom: 0; }

@media (max-width: 700px) {
  .sidebar { display: none; }
  :root { --sidebar: 0px; }
  .topbar .sub { display: none; }

// Highlight neighbors on click
network.on('click', function(params) {
  if (params.nodes.length > 0) {
    const nodeId = params.nodes[0];
    const connectedNodes = network.getConnectedNodes(nodeId);
    const connectedEdges = network.getConnectedEdges(nodeId);

    // Dim all, highlight selected + neighbors
    const allNodes = nodesData.get();
    const allEdges = edgesData.get();

    const highlightNodes = new Set([nodeId, ...connectedNodes]);

    nodesData.update(allNodes.map(n => ({
      id: n.id,
      opacity: highlightNodes.has(n.id) ? 1.0 : 0.08,
      font: { ...n.font, color: highlightNodes.has(n.id) ? '#fff' : '#2a2740' }
    })));

    edgesData.update(allEdges.map(e => ({
      id: e.id,
      color: { ...e.color, opacity: connectedEdges.includes(e.id) ? 0.8 : 0.03 }
    })));
  } else {
    // Reset
    const allNodes = nodesData.get();
    const allEdges = edgesData.get();
    nodesData.update(allNodes.map(n => ({ id: n.id, opacity: 1.0, font: { ...n.font, color: '#c8c4bc' } })));
    edgesData.update(allEdges.map(e => ({ id: e.id, color: { color: '#2a2740', highlight: '#ffc857', hover: '#ffc857', opacity: 0.4 } })));
  }
});

// Book legend
const activeBooks = new Set(booksData.map(b => b.id));
const bookCounts = {};
nodesData.get().forEach(n => { bookCounts[n.group] = (bookCounts[n.group] || 0) + 1; });

const bookList = document.getElementById('book-list');
booksData.forEach(book => {
  const el = document.createElement('div');
  el.className = 'book-item active';
  el.dataset.bookId = book.id;
  el.innerHTML = `<span class="book-dot" style="background:${book.color}"></span><span class="book-label">${book.name}</span><span class="book-count">${bookCounts[book.id] || 0}</span>`;
  el.addEventListener('click', () => toggleBook(book.id, el));
  bookList.appendChild(el);
});

function toggleBook(bookId, el) {
  if (activeBooks.has(bookId)) {
    activeBooks.delete(bookId);
    el.classList.remove('active');
    el.classList.add('off');
  } else {
    activeBooks.add(bookId);
    el.classList.add('active');
    el.classList.remove('off');
  }
  applyFilter();
}

function applyFilter() {
  const allNodes = nodesData.get();
  const hiddenNodes = new Set();
  allNodes.forEach(n => {
    const hidden = !activeBooks.has(n.group);
    if (hidden) hiddenNodes.add(n.id);
    nodesData.update({ id: n.id, hidden });
  });
  edgesData.get().forEach(e => {
    edgesData.update({ id: e.id, hidden: hiddenNodes.has(e.from) || hiddenNodes.has(e.to) });
  });
}

document.getElementById('btn-all').addEventListener('click', () => {
  booksData.forEach(b => activeBooks.add(b.id));
  document.querySelectorAll('.book-item').forEach(el => { el.classList.add('active'); el.classList.remove('off'); });
  applyFilter();
});

document.getElementById('btn-none').addEventListener('click', () => {
  activeBooks.clear();
  document.querySelectorAll('.book-item').forEach(el => { el.classList.remove('active'); el.classList.add('off'); });
  applyFilter();
});

// Physics toggle
const physToggle = document.getElementById('physics-toggle');
physToggle.addEventListener('click', () => {
  const on = physToggle.classList.toggle('on');
  network.setOptions({ physics: { enabled: on } });
});
</script>
</body>
