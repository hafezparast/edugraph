<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduGraph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #08090e;
  --surface: rgba(12,14,24,0.94);
  --border: rgba(255,255,255,0.06);
  --text: #e8e4dc;
  --text2: #8a8697;
  --text3: #55516a;
  --gold: #ffc857;
  --topbar: 52px;
  --sidebar: 230px;
  --detail: 300px;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; overflow: hidden; }
body::after { content: ''; position: fixed; inset: 0; opacity: 0.035; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); pointer-events: none; z-index: 9999; }

.topbar { position: fixed; top: 0; left: 0; right: 0; height: var(--topbar); display: flex; align-items: center; justify-content: space-between; padding: 0 18px; background: rgba(8,9,14,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); z-index: 200; }
.topbar-left { display: flex; align-items: baseline; gap: 12px; }
.topbar h1 { font-family: 'Instrument Serif', serif; font-size: 22px; font-weight: 400; color: var(--gold); }
.topbar .sub { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-right { display: flex; align-items: center; gap: 6px; }
.stats { display: flex; gap: 14px; margin-right: 12px; }
.stat-n { font-family: 'Instrument Serif', serif; font-size: 17px; color: var(--gold); }
.stat-l { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-left: 3px; }
.nav-btn { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text2); padding: 4px 10px; border-radius: 5px; font-size: 10px; font-family: 'DM Sans', sans-serif; cursor: pointer; text-decoration: none; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.15s; }
.nav-btn:hover { background: rgba(255,200,87,0.08); border-color: rgba(255,200,87,0.15); color: var(--gold); }

.sidebar { position: fixed; top: var(--topbar); left: 0; bottom: 0; width: var(--sidebar); background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; z-index: 100; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
.sec-title { font-family: 'Instrument Serif', serif; font-size: 13px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.sec-title::before { content: ''; width: 2px; height: 11px; background: var(--gold); border-radius: 1px; }

.search-box { width: 100%; padding: 7px 10px 7px 28px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; outline: none; }
.search-box::placeholder { color: var(--text3); }
.search-box:focus { border-color: rgba(255,200,87,0.25); }
.search-wrap { position: relative; }
.search-wrap::before { content: '⌕'; position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; }

.tab-bar { display: flex; gap: 0; margin-bottom: 8px; border-bottom: 1px solid var(--border); }
.tab-btn { flex: 1; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text3); padding: 6px 4px; font-size: 10px; font-family: 'DM Sans', sans-serif; cursor: pointer; text-transform: uppercase; letter-spacing: 0.8px; transition: all 0.15s; }
.tab-btn:hover { color: var(--text2); }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-content { display: none; }
.tab-content.active { display: block; }

.book-btns { display: flex; gap: 3px; margin-bottom: 6px; }
.book-btn { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text3); padding: 3px; border-radius: 4px; font-size: 9px; font-family: 'DM Sans', sans-serif; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
.book-btn:hover { color: var(--text2); }

.group-header { display: flex; align-items: center; gap: 5px; padding: 5px 4px; cursor: pointer; user-select: none; border-radius: 4px; margin-top: 4px; transition: background 0.12s; }
.group-header:hover { background: rgba(255,255,255,0.03); }
.group-arrow { font-size: 8px; color: var(--text3); transition: transform 0.2s; width: 12px; text-align: center; }
.group-header.collapsed .group-arrow { transform: rotate(-90deg); }
.group-label { font-size: 10px; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; flex: 1; }
.group-cnt { font-size: 9px; color: var(--text3); }
.group-body { overflow: hidden; transition: max-height 0.25s ease; }
.group-header.collapsed + .group-body { max-height: 0 !important; overflow: hidden; }

.book-list { display: flex; flex-direction: column; gap: 1px; }
.book-item { display: flex; align-items: center; gap: 6px; padding: 3px 5px 3px 16px; border-radius: 4px; cursor: pointer; transition: all 0.12s; user-select: none; }
.book-item:hover { background: rgba(255,255,255,0.03); }
.book-item.off { opacity: 0.2; }
.book-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: transform 0.15s; }
.book-item:not(.off) .book-dot { box-shadow: 0 0 5px currentColor; }
.book-name { font-size: 10px; color: var(--text2); flex: 1; }
.book-item:not(.off) .book-name { color: var(--text); }
.book-cnt { font-size: 9px; color: var(--text3); }

.strand-item { display: flex; align-items: center; gap: 6px; padding: 3px 5px 3px 16px; border-radius: 4px; cursor: pointer; transition: all 0.12s; user-select: none; }
.strand-item:hover { background: rgba(255,255,255,0.03); }
.strand-item.off { opacity: 0.2; }
.strand-dot { width: 7px; height: 7px; border-radius: 3px; flex-shrink: 0; }
.strand-name { font-size: 10px; color: var(--text2); flex: 1; }
.strand-item:not(.off) .strand-name { color: var(--text); }
.strand-cnt { font-size: 9px; color: var(--text3); }

.controls { padding-top: 8px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
.ctrl-row { display: flex; align-items: center; justify-content: space-between; }
.ctrl-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.ctrl-slider { -webkit-appearance: none; width: 90px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
.ctrl-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--gold); border-radius: 50%; cursor: pointer; }

.hint { font-size: 9px; color: var(--text3); line-height: 1.6; padding-top: 8px; border-top: 1px solid var(--border); }
.hint b { color: var(--text2); font-weight: 500; }

#graph-container { position: fixed; top: var(--topbar); left: var(--sidebar); right: 0; bottom: 0; transition: right 0.3s; }
#graph-container.detail-open { right: var(--detail); }
svg { width: 100%; height: 100%; display: block; }

.detail { position: fixed; top: var(--topbar); right: calc(-1 * var(--detail)); bottom: 0; width: var(--detail); background: var(--surface); border-left: 1px solid var(--border); z-index: 100; overflow-y: auto; padding: 20px 16px; transition: right 0.3s; }
.detail.open { right: 0; }
.detail::-webkit-scrollbar { width: 3px; }
.detail::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
.detail-close { position: absolute; top: 12px; right: 12px; width: 24px; height: 24px; border-radius: 5px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.detail-close:hover { color: var(--text); }
.detail-badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 12px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.detail-title { font-family: 'Instrument Serif', serif; font-size: 20px; line-height: 1.2; margin-bottom: 14px; }
.detail-desc { font-size: 11px; color: var(--text2); line-height: 1.5; margin-bottom: 10px; }
.conn-section { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
.conn-head { font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-bottom: 6px; }
.conn-head.prereq { color: #e07a5f; }
.conn-head.leads { color: #81b29a; }
.conn-item { display: flex; align-items: center; gap: 6px; padding: 3px 5px; border-radius: 4px; cursor: pointer; transition: background 0.12s; }
.conn-item:hover { background: rgba(255,255,255,0.04); }
.conn-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.conn-label { font-size: 11px; color: var(--text2); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conn-book { font-size: 8px; color: var(--text3); flex-shrink: 0; }

#loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 9998; }
#loading span { font-family: 'Instrument Serif', serif; font-size: 24px; color: var(--gold); }

@media (max-width: 800px) {
  .sidebar { display: none; }
  :root { --sidebar: 0px; }
  .topbar .sub, .stats { display: none; }
}
</style>
</head>
<body>

<div id="loading"><span>Loading…</span></div>

<header class="topbar">
  <div class="topbar-left">
    <h1>EduGraph</h1>
    <span class="sub" id="subtitle"></span>
  </div>
  <div class="topbar-right">
    <div class="stats">
      <span><span class="stat-n" id="s-nodes">0</span><span class="stat-l">nodes</span></span>
      <span><span class="stat-n" id="s-edges">0</span><span class="stat-l">edges</span></span>
    </div>
  </div>
</header>

<aside class="sidebar">
  <div class="search-wrap">
    <input type="text" class="search-box" id="search" placeholder="Search topics..." autocomplete="off">
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="grades">Grades</button>
    <button class="tab-btn" data-tab="topics">Topics</button>
    <button class="tab-btn" data-tab="forces">Forces</button>
  </div>
  <div class="tab-content active" id="tab-grades">
    <div class="book-btns">
      <button class="book-btn" id="b-all">All</button>
      <button class="book-btn" id="b-none">None</button>
    </div>
    <div id="grades-list"></div>
  </div>
  <div class="tab-content" id="tab-topics">
    <div class="book-btns">
      <button class="book-btn" id="t-all">All</button>
      <button class="book-btn" id="t-none">None</button>
    </div>
    <div id="topics-list"></div>
  </div>
  <div class="tab-content" id="tab-forces">
    <div class="sec-title">Physics</div>
    <div class="controls">
      <div class="ctrl-row"><span class="ctrl-label">Repulsion</span><input type="range" class="ctrl-slider" id="sl-charge" min="-600" max="-20" value="-120"></div>
      <div class="ctrl-row"><span class="ctrl-label">Link Dist</span><input type="range" class="ctrl-slider" id="sl-dist" min="15" max="200" value="55"></div>
      <div class="ctrl-row"><span class="ctrl-label">Gravity</span><input type="range" class="ctrl-slider" id="sl-gravity" min="0" max="100" value="8"></div>
      <div class="ctrl-row"><span class="ctrl-label">Collision</span><input type="range" class="ctrl-slider" id="sl-collide" min="1" max="30" value="10"></div>
    </div>
    <div class="hint">
      <b>Drag</b> nodes — physics responds live<br>
      <b>Scroll</b> to zoom, drag canvas to pan<br>
      <b>Click</b> node for details &amp; neighbors<br>
      <b>Sliders</b> tune forces in real-time
    </div>
  </div>
</aside>

<div id="graph-container"><svg id="svg"></svg></div>

<div class="detail" id="detail">
  <button class="detail-close" id="detail-close">✕</button>
  <div id="detail-content"></div>
</div>

<script>
// --- Determine which JSON file to load ---
const params = new URLSearchParams(window.location.search);
const fileParam = params.get('f') || 'sg-math';
const dataUrl = 'data/' + encodeURIComponent(fileParam) + '.json';

fetch(dataUrl)
  .then(r => { if (!r.ok) throw new Error('Failed to load ' + dataUrl); return r.json(); })
  .then(data => init(data))
  .catch(err => {
    document.getElementById('loading').innerHTML = '<span style="color:#e07a5f">' + err.message + '</span>';
  });

function init(data) {
  document.getElementById('loading').style.display = 'none';

  const metadata = data.metadata || {};
  const booksData = data.books || [];
  const bookMap = {};
  booksData.forEach(b => { bookMap[b.id] = b; });

  // Set title
  const curriculum = metadata.curriculum || metadata.domain || fileParam;
  document.title = 'EduGraph \u2014 ' + curriculum;
  document.getElementById('subtitle').textContent = metadata.description || curriculum;

  // Transform JSON nodes to graph nodes
  const nodes = (data.nodes || []).map(n => {
    const book = bookMap[n.book] || {};
    return {
      id: n.id,
      label: n.label,
      color: n.bookColor || book.color || '#888',
      book: n.book,
      bookName: n.bookName || book.name || '',
      bookOrder: n.bookOrder || book.order || 0,
      r: 4 + (book.order || 1) * 0.8,
      description: n.description || '',
      type: n.type || 'concept',
      external_id: n.external_id || '',
      comprehended: n.comprehended || false
    };
  });

  const edges = (data.edges || []).map(e => ({
    source: e.source,
    target: e.target,
    relation: e.relation || 'prerequisite_for'
  }));

  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });

  // Build topic strands by analyzing node labels, descriptions, and IDs
  // These keyword rules classify nodes into subject-area topics across all year levels
  const topicRules = [
    // Mathematics
    { name: 'Numbers & Arithmetic', color: '#ef4444', kw: /\bnumber|counting|integers|whole number|place value|digit|addition|subtraction|multiply|division|four operations|arithmetic|rounding|estimation|prime number|factor|multiple|hcf|lcm|square root|cube root|index number|indices|standard form|number base|operation/i },
    { name: 'Fractions & Decimals', color: '#f97316', kw: /\bfraction|decimal|percent|ratio|proportion|rate\b/i },
    { name: 'Algebra', color: '#f59e0b', kw: /\balgebra|equation|expression|inequalit|formula|simultaneous|quadratic|polynomial|expansion|factori[sz]|variation|linear law|function|surds?|logarithm|exponential|indices.*log|binomial/i },
    { name: 'Sequences & Series', color: '#eab308', kw: /\bsequence|series|pattern|progression|ap\b|gp\b|arithmetic progression|geometric progression|summation|maclaurin|convergence/i },
    { name: 'Geometry', color: '#84cc16', kw: /\bgeometry|angle|triangle|polygon|circle|line|parallel|perpendicular|symmetry|congruence|similar|coordinate|locus|loci|transformation|reflection|rotation|enlargement|plan.*elevation|bearing|shape|2d|3d|prism|net\b/i },
    { name: 'Measurement', color: '#22c55e', kw: /\bmeasur|length|mass|volume|area|perimeter|surface area|mensuration|time\b|money|speed|distance|unit|density|capacity/i },
    { name: 'Trigonometry', color: '#10b981', kw: /\btrigonometr|sine|cosine|tangent|circular measure|radian/i },
    { name: 'Calculus', color: '#14b8a6', kw: /\bcalculus|differentiat|integrat|limit|continuity|gradient|tangent line|rate of change|kinematics|differential equation/i },
    { name: 'Vectors & Matrices', color: '#06b6d4', kw: /\bvector|matri[cx]|determinant|inverse matrix|cross product|scalar product/i },
    { name: 'Statistics & Data', color: '#0ea5e9', kw: /\bstatistic|data|graph|chart|pictograph|bar graph|pie chart|histogram|frequency|mean|median|mode|average|standard deviation|dispersion|cumulative|sampling|estimation|correlation|regression/i },
    { name: 'Probability', color: '#3b82f6', kw: /\bprobabilit|combinat|permutation|likelihood|random variable|distribution|binomial|poisson|normal distribution|hypothesis|chi-squared|expected value/i },
    { name: 'Sets & Logic', color: '#6366f1', kw: /\bset\b|sets\b|venn|logic|reasoning|boolean|truth table|network|graph theory/i },
    { name: 'Complex Numbers', color: '#8b5cf6', kw: /\bcomplex number|argand|polar form|de moivre/i },
    { name: 'Financial Maths', color: '#a855f7', kw: /\bfinancial|interest|profit|loss|tax|insurance|invoice|bill|budget|discount|asset|liabilit|dividend|money management/i },
    // Sciences - Physics
    { name: 'Mechanics', color: '#ef4444', kw: /\bmechanic|motion|kinematic|force|newton|momentum|impulse|inertia|friction|dynamics|velocity|acceleration|free fall|gravit|weight|torque|moment|equilibrium|pressure|archimedes|bernoulli|pascal|circular motion|satellite|kepler|projectile/i },
    { name: 'Energy & Work', color: '#f97316', kw: /\benergy|work\b|power\b|conservation of energy|kinetic energy|potential energy|efficiency|elastic/i },
    { name: 'Waves & Optics', color: '#f59e0b', kw: /\bwave|optic|light|refraction|reflection|diffraction|interference|superposition|lens|mirror|sound|electromagnetic|spectrum|polarisation|resonance|oscillation|shm|damping/i },
    { name: 'Thermal Physics', color: '#eab308', kw: /\bthermal|heat|temperature|specific heat|latent heat|gas law|ideal gas|kinetic theory|thermodynamic|conduction|convection|radiation|boiling|melting|state of matter/i },
    { name: 'Electricity & Magnetism', color: '#84cc16', kw: /\belectri|circuit|current|voltage|resistance|ohm|capacit|magnet|electromagnetic|induction|transformer|alternating|dc\b|ac\b|motor|generator|coulomb|electric field|charge/i },
    { name: 'Modern Physics', color: '#22c55e', kw: /\bquantum|photoelectric|nuclear|radioact|atom|fission|fusion|relativity|x-ray|particle physics|wave-particle|electron|cathode|logic gate|semiconductor|transistor|diode/i },
    // Sciences - Chemistry
    { name: 'Atomic Structure & Bonding', color: '#3b82f6', kw: /\batomic|atom|electron config|isotope|ion|bonding|ionic|covalent|metallic|intermolecular|van der waals|hydrogen bond|electronegativity|orbital|periodic table|period\b|group\b.*element/i },
    { name: 'Chemical Reactions', color: '#06b6d4', kw: /\breaction|equation|stoichiometry|mole\b|formula|oxidation|reduction|redox|electrolysis|electrochemistry|reactivity|rate of reaction|collision theory|catalyst|equilibri/i },
    { name: 'Acids, Bases & Salts', color: '#10b981', kw: /\bacid|base|alkali|salt|ph\b|neutrali[sz]|titration|buffer|indicator/i },
    { name: 'Organic Chemistry', color: '#8b5cf6', kw: /\borganic|carbon compound|hydrocarbon|alkane|alkene|alcohol|ester|polymer|carboxylic|amine|benzene|aromatic|halogen.*alkane|functional group|isomer|saponif/i },
    { name: 'Energetics & Thermochemistry', color: '#a855f7', kw: /\benthalpyenergetics|thermochemi|hess|born-haber|lattice energy|entropy|gibbs|calorimetry|exothermic|endothermic/i },
    // Sciences - Biology
    { name: 'Cell Biology', color: '#22c55e', kw: /\bcell\b|membrane|organelle|mitosis|meiosis|cell division|cell cycle|microscope|prokaryot|eukaryot|osmosis|diffusion|active transport/i },
    { name: 'Genetics & Evolution', color: '#6366f1', kw: /\bgenet|dna|rna|gene\b|inherit|mutation|natural selection|evolution|speciation|variation|allele|mendel|codominance|sex.linked|hardy-weinberg|chromosome|protein synthesis|transcription|translation/i },
    { name: 'Human Biology', color: '#ef4444', kw: /\bdigest|nutrition|respir|circulat|heart|blood|nervous|brain|hormone|endocrine|excret|kidney|homeostasis|immun|vaccine|skeleton|muscle|reproduct|disease|health|psychoactive/i },
    { name: 'Plant Biology', color: '#84cc16', kw: /\bplant|photosynthe|transpir|xylem|phloem|leaf|root|seed|germination|pollination|tropism|meristem/i },
    { name: 'Ecology', color: '#10b981', kw: /\becolog|ecosystem|food chain|food web|biodiversity|conservation|population|habitat|environment|pollution|sustainability|nutrient cycl|energy flow|succession|climate change|deforestation/i },
    // General / CS
    { name: 'Algorithms & Programming', color: '#3b82f6', kw: /\balgorithm|programming|pseudocode|flowchart|variable|loop|array|function|procedure|data type|control structure|sorting|searching|recursion|oop|class|object|inheritance|polymorphism|encapsulation/i },
    { name: 'Computer Systems', color: '#06b6d4', kw: /\bcpu|processor|memory|storage|hardware|software|operating system|von neumann|architecture|binary|hexadecimal|ascii|logic gate|boolean/i },
    { name: 'Networks & Security', color: '#f59e0b', kw: /\bnetwork|internet|protocol|tcp|ip address|security|encryption|firewall|malware|cyber|topolog/i },
    { name: 'Databases', color: '#8b5cf6', kw: /\bdatabase|sql|entity|normalisation|relational|erd\b|key.*cardinality/i },
    // History
    { name: 'Ancient & Medieval', color: '#d97706', kw: /\bciviliz|tamadun|prehistoric|ice age|mesopotam|egypt|roman|greek|dynasty|sultan|melaka|kingdom|kerajaan/i },
    { name: 'Colonial & Modern', color: '#ef4444', kw: /\bcoloni|penjajah|british|independence|merdeka|world war|cold war|revolution|nationalism|communist|constitution|perlembagaan|democracy|parliament/i },
    { name: 'Society & Culture', color: '#8b5cf6', kw: /\breligion|islam|culture|ethnic|language|education|social|economic development|trade|globalisation|diplomati/i },
    // Languages
    { name: 'Listening & Speaking', color: '#3b82f6', kw: /\blistening|speaking|oral|pronunciation|phonetic|conversation|dialogue/i },
    { name: 'Reading & Writing', color: '#22c55e', kw: /\breading|writing|composition|essay|comprehension|grammar|syntax|vocabulary|spelling|paragraph/i },
    { name: 'Language Knowledge', color: '#f59e0b', kw: /\bmorpholog|lexis|semantic|pragmatic|discourse|phonolog|language change|sociolinguistic|acquisition|bilingual/i },
  ];

  // Classify each node into a topic strand
  function classifyNode(n) {
    const text = (n.label + ' ' + n.description + ' ' + n.id).toLowerCase();
    for (const rule of topicRules) {
      if (rule.kw.test(text)) return rule.name;
    }
    return 'Other';
  }

  // Assign strand to each node
  nodes.forEach(n => { n.strand = classifyNode(n); });

  // Build strands data (only include strands that have nodes)
  const strandColors = {};
  topicRules.forEach(r => { strandColors[r.name] = r.color; });
  strandColors['Other'] = '#888';

  const strandMap = {};
  nodes.forEach(n => {
    const key = n.strand;
    if (!strandMap[key]) strandMap[key] = { name: key, color: strandColors[key] || '#888', nodeIds: [] };
    strandMap[key].nodeIds.push(n.id);
  });
  // Sort by count descending, put "Other" last
  const strandsData = Object.values(strandMap)
    .sort((a, b) => a.name === 'Other' ? 1 : b.name === 'Other' ? -1 : b.nodeIds.length - a.nodeIds.length);

  // --- State ---
  const activeBooks = new Set(booksData.map(b => b.id));
  const activeStrands = new Set(strandsData.map(s => s.name));
  let filterMode = 'grades';
  let selectedNode = null;

  // --- D3 ---
  const container = document.getElementById('graph-container');
  const svg = d3.select('#svg');
  const g = svg.append('g');

  svg.append('defs').append('marker')
    .attr('id', 'arrow').attr('viewBox', '0 -4 8 8').attr('refX', 18).attr('refY', 0)
    .attr('markerWidth', 5).attr('markerHeight', 5).attr('orient', 'auto')
    .append('path').attr('d', 'M0,-3L7,0L0,3').attr('fill', '#6b6590');

  svg.select('defs').append('marker')
    .attr('id', 'arrow-hl').attr('viewBox', '0 -4 8 8').attr('refX', 18).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6).attr('orient', 'auto')
    .append('path').attr('d', 'M0,-3L7,0L0,3').attr('fill', '#ffc857');

  const linkGroup = g.append('g').attr('class', 'links');
  const nodeGroup = g.append('g').attr('class', 'nodes');
  const labelGroup = g.append('g').attr('class', 'labels');
  let linkEls, nodeEls, labelEls;

  function eid(e, field) { return typeof e[field] === 'object' ? e[field].id : e[field]; }

  function renderGraph() {
    let visibleIds;
    if (filterMode === 'topics') {
      visibleIds = new Set();
      strandsData.filter(s => activeStrands.has(s.name)).forEach(s => s.nodeIds.forEach(id => visibleIds.add(id)));
    } else {
      visibleIds = new Set(nodes.filter(n => activeBooks.has(n.book)).map(n => n.id));
    }
    const vNodes = nodes.filter(n => visibleIds.has(n.id));
    const vEdges = edges.filter(e => visibleIds.has(eid(e,'source')) && visibleIds.has(eid(e,'target')));

    linkEls = linkGroup.selectAll('line').data(vEdges, d => eid(d,'source')+'->'+eid(d,'target'));
    linkEls.exit().remove();
    linkEls = linkEls.enter().append('line')
      .attr('stroke', '#5a5480').attr('stroke-width', 0.7).attr('stroke-opacity', 0.5)
      .attr('marker-end', 'url(#arrow)').merge(linkEls);

    nodeEls = nodeGroup.selectAll('circle').data(vNodes, d => d.id);
    nodeEls.exit().remove();
    nodeEls = nodeEls.enter().append('circle')
      .attr('r', d => d.r).attr('fill', d => d.color).attr('fill-opacity', 0.85)
      .attr('stroke', 'none').attr('stroke-width', 2).attr('cursor', 'pointer')
      .on('click', (ev, d) => { ev.stopPropagation(); selectNode(d); })
      .call(d3.drag().on('start', dragStart).on('drag', dragging).on('end', dragEnd))
      .merge(nodeEls).attr('fill', d => d.color);

    labelEls = labelGroup.selectAll('text').data(vNodes, d => d.id);
    labelEls.exit().remove();
    labelEls = labelEls.enter().append('text')
      .attr('font-size', d => Math.max(6, d.r * 0.85))
      .attr('font-family', "'DM Sans', sans-serif").attr('fill', '#a09cac')
      .attr('text-anchor', 'middle').attr('dy', d => d.r + 10).attr('pointer-events', 'none')
      .text(d => d.label.length > 22 ? d.label.slice(0, 20) + '\u2026' : d.label)
      .merge(labelEls);

    simulation.nodes(vNodes);
    simulation.force('link').links(vEdges);
    simulation.alpha(0.6).restart();
    updateStats(vNodes.length, vEdges.length);
  }

  const simulation = d3.forceSimulation()
    .force('link', d3.forceLink().id(d => d.id).distance(55).strength(0.3))
    .force('charge', d3.forceManyBody().strength(-120).distanceMax(400))
    .force('center', d3.forceCenter())
    .force('collide', d3.forceCollide().radius(10).strength(0.7))
    .force('x', d3.forceX().strength(0.02))
    .force('y', d3.forceY().strength(0.02))
    .alphaDecay(0.015).velocityDecay(0.35)
    .on('tick', () => {
      linkEls.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      nodeEls.attr('cx', d => d.x).attr('cy', d => d.y);
      labelEls.attr('x', d => d.x).attr('y', d => d.y);
    });

  const zoom = d3.zoom().scaleExtent([0.05, 8]).on('zoom', ev => g.attr('transform', ev.transform));
  svg.call(zoom);

  function resize() {
    const w = container.clientWidth, h = container.clientHeight;
    svg.attr('viewBox', [-w/2, -h/2, w, h]);
    simulation.force('center', d3.forceCenter(0, 0));
  }
  window.addEventListener('resize', resize);
  resize();

  function dragStart(ev, d) { if (!ev.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
  function dragging(ev, d) { d.fx = ev.x; d.fy = ev.y; }
  function dragEnd(ev, d) { if (!ev.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

  function selectNode(d) {
    selectedNode = d;
    const neighbors = new Set([d.id]);
    const prereqEdges = new Set(), leadsEdges = new Set();
    edges.forEach(e => {
      const s = eid(e,'source'), t = eid(e,'target');
      if (s === d.id) { neighbors.add(t); leadsEdges.add(s+'->'+t); }
      if (t === d.id) { neighbors.add(s); prereqEdges.add(s+'->'+t); }
    });
    nodeEls.attr('fill-opacity', n => neighbors.has(n.id) ? 1 : 0.06)
      .attr('stroke', n => n.id === d.id ? '#ffc857' : 'none')
      .attr('stroke-width', n => n.id === d.id ? 2.5 : 0);
    labelEls.attr('fill', n => neighbors.has(n.id) ? '#e8e4dc' : '#1a1830')
      .attr('font-weight', n => n.id === d.id ? 600 : 400);
    linkEls.each(function(e) {
      const k = eid(e,'source')+'->'+eid(e,'target');
      const hl = prereqEdges.has(k) || leadsEdges.has(k);
      d3.select(this)
        .attr('stroke', prereqEdges.has(k) ? '#e07a5f' : leadsEdges.has(k) ? '#81b29a' : '#5a5480')
        .attr('stroke-opacity', hl ? 0.9 : 0.04)
        .attr('stroke-width', hl ? 1.8 : 0.7)
        .attr('marker-end', hl ? 'url(#arrow-hl)' : 'url(#arrow)');
    });
    showDetail(d);
  }

  function clearSelection() {
    selectedNode = null;
    nodeEls.attr('fill-opacity', 0.85).attr('stroke', 'none');
    labelEls.attr('fill', '#a09cac').attr('font-weight', 400);
    linkEls.attr('stroke', '#5a5480').attr('stroke-opacity', 0.5).attr('stroke-width', 0.7).attr('marker-end', 'url(#arrow)');
    document.getElementById('detail').classList.remove('open');
    document.getElementById('graph-container').classList.remove('detail-open');
  }
  svg.on('click', () => clearSelection());

  function showDetail(d) {
    document.getElementById('graph-container').classList.add('detail-open');
    const prereqs = [], leads = [];
    edges.forEach(e => {
      const s = eid(e,'source'), t = eid(e,'target');
      if (t === d.id && nodeMap[s]) prereqs.push(nodeMap[s]);
      if (s === d.id && nodeMap[t]) leads.push(nodeMap[t]);
    });
    const content = document.getElementById('detail-content');
    content.innerHTML =
      '<div class="detail-badge" style="background:'+d.color+'18;color:'+d.color+';border:1px solid '+d.color+'30">' +
        '<span style="width:5px;height:5px;border-radius:50%;background:'+d.color+';display:inline-block"></span> ' +
        d.bookName +
      '</div>' +
      '<div class="detail-title">' + d.label + '</div>' +
      (d.description ? '<div class="detail-desc">' + d.description + '</div>' : '') +
      (prereqs.length ?
        '<div class="conn-section"><div class="conn-head prereq">\u25B2 Prerequisites (' + prereqs.length + ')</div>' +
        prereqs.map(n => '<div class="conn-item" data-id="'+n.id+'"><span class="conn-dot" style="background:'+n.color+'"></span><span class="conn-label">'+n.label+'</span><span class="conn-book">'+n.bookName+'</span></div>').join('') +
        '</div>'
        : '<div class="conn-section"><div class="conn-head" style="color:var(--gold)">\u2605 Starting point</div></div>') +
      (leads.length ?
        '<div class="conn-section"><div class="conn-head leads">\u25BC Leads to (' + leads.length + ')</div>' +
        leads.map(n => '<div class="conn-item" data-id="'+n.id+'"><span class="conn-dot" style="background:'+n.color+'"></span><span class="conn-label">'+n.label+'</span><span class="conn-book">'+n.bookName+'</span></div>').join('') +
        '</div>' : '');
    content.querySelectorAll('.conn-item').forEach(el => {
      el.addEventListener('click', () => { const n = nodeMap[el.dataset.id]; if (n) selectNode(n); });
    });
    document.getElementById('detail').classList.add('open');
  }

  document.getElementById('detail-close').addEventListener('click', clearSelection);

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // Grades sidebar
  const bookCounts = {};
  nodes.forEach(n => { bookCounts[n.book] = (bookCounts[n.book] || 0) + 1; });
  const gradesEl = document.getElementById('grades-list');
  const totalNodes = booksData.reduce((s, b) => s + (bookCounts[b.id] || 0), 0);
  const header = document.createElement('div');
  header.className = 'group-header';
  header.innerHTML = '<span class="group-arrow">\u25BC</span><span class="group-label">All</span><span class="group-cnt">' + totalNodes + '</span>';
  const body = document.createElement('div');
  body.className = 'group-body';
  body.style.maxHeight = '2000px';
  const list = document.createElement('div');
  list.className = 'book-list';
  booksData.forEach(b => {
    const el = document.createElement('div');
    el.className = 'book-item'; el.dataset.id = b.id;
    el.innerHTML = '<span class="book-dot" style="background:'+b.color+';color:'+b.color+'"></span><span class="book-name">'+b.name+'</span><span class="book-cnt">'+(bookCounts[b.id]||0)+'</span>';
    el.addEventListener('click', ev => {
      ev.stopPropagation();
      if (activeBooks.has(b.id)) { activeBooks.delete(b.id); el.classList.add('off'); }
      else { activeBooks.add(b.id); el.classList.remove('off'); }
      filterMode = 'grades'; renderGraph();
    });
    list.appendChild(el);
  });
  body.appendChild(list);
  header.addEventListener('click', () => header.classList.toggle('collapsed'));
  gradesEl.appendChild(header);
  gradesEl.appendChild(body);

  document.getElementById('b-all').addEventListener('click', () => {
    booksData.forEach(b => activeBooks.add(b.id));
    document.querySelectorAll('#grades-list .book-item').forEach(el => el.classList.remove('off'));
    filterMode = 'grades'; renderGraph();
  });
  document.getElementById('b-none').addEventListener('click', () => {
    activeBooks.clear();
    document.querySelectorAll('#grades-list .book-item').forEach(el => el.classList.add('off'));
    filterMode = 'grades'; renderGraph();
  });

  // Topics sidebar
  const topicsEl = document.getElementById('topics-list');
  strandsData.forEach(s => {
    const el = document.createElement('div');
    el.className = 'strand-item'; el.dataset.strand = s.name;
    el.innerHTML = '<span class="strand-dot" style="background:'+s.color+'"></span><span class="strand-name">'+s.name+'</span><span class="strand-cnt">'+s.nodeIds.length+'</span>';
    el.addEventListener('click', ev => {
      ev.stopPropagation();
      if (activeStrands.has(s.name)) { activeStrands.delete(s.name); el.classList.add('off'); }
      else { activeStrands.add(s.name); el.classList.remove('off'); }
      filterMode = 'topics'; renderGraph();
    });
    topicsEl.appendChild(el);
  });
  document.getElementById('t-all').addEventListener('click', () => {
    strandsData.forEach(s => activeStrands.add(s.name));
    document.querySelectorAll('.strand-item').forEach(el => el.classList.remove('off'));
    filterMode = 'topics'; renderGraph();
  });
  document.getElementById('t-none').addEventListener('click', () => {
    activeStrands.clear();
    document.querySelectorAll('.strand-item').forEach(el => el.classList.add('off'));
    filterMode = 'topics'; renderGraph();
  });

  // Force sliders
  document.getElementById('sl-charge').addEventListener('input', function() { simulation.force('charge').strength(+this.value); simulation.alpha(0.4).restart(); });
  document.getElementById('sl-dist').addEventListener('input', function() { simulation.force('link').distance(+this.value); simulation.alpha(0.4).restart(); });
  document.getElementById('sl-gravity').addEventListener('input', function() { const v=+this.value/1000; simulation.force('x').strength(v); simulation.force('y').strength(v); simulation.alpha(0.4).restart(); });
  document.getElementById('sl-collide').addEventListener('input', function() { simulation.force('collide').radius(+this.value); simulation.alpha(0.4).restart(); });

  // Search
  let searchTimeout;
  document.getElementById('search').addEventListener('input', function() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      const q = this.value.trim().toLowerCase();
      if (!q) { clearSelection(); return; }
      const matches = nodes.filter(n => activeBooks.has(n.book) && (n.label.toLowerCase().includes(q) || n.id.toLowerCase().includes(q)));
      if (matches.length) {
        const m = matches[0];
        if (m.x != null) {
          const t = d3.zoomIdentity.translate(-m.x*2+container.clientWidth/2, -m.y*2+container.clientHeight/2).scale(2);
          svg.transition().duration(500).call(zoom.transform, t);
        }
        const matchIds = new Set(matches.map(n => n.id));
        nodeEls.attr('fill-opacity', n => matchIds.has(n.id) ? 1 : 0.06)
          .attr('stroke', n => matchIds.has(n.id) ? '#ffc857' : 'none')
          .attr('stroke-width', n => matchIds.has(n.id) ? 2 : 0);
        labelEls.attr('fill', n => matchIds.has(n.id) ? '#fff' : '#1a1830');
      }
    }, 250);
  });

  function updateStats(n, e) {
    document.getElementById('s-nodes').textContent = n;
    document.getElementById('s-edges').textContent = e;
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { clearSelection(); document.getElementById('search').value = ''; }
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') { e.preventDefault(); document.getElementById('search').focus(); }
  });

  renderGraph();
}
</script>
</body>
</html>
